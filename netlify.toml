[build]
  command = "vite build"
  publish = "dist/client"

# Ensure static favicons are served directly (not rewritten to SSR).
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.png"
  to = "/favicon.png"
  status = 200
  force = true

[[redirects]]
  from = "/favicon-16x16.png"
  to = "/favicon-16x16.png"
  status = 200
  force = true

[[redirects]]
  from = "/favicon-32x32.png"
  to = "/favicon-32x32.png"
  status = 200
  force = true

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/apple-touch-icon.png"
  status = 200
  force = true

[[redirects]]
  from = "/icon-192.png"
  to = "/icon-192.png"
  status = 200
  force = true

[[redirects]]
  from = "/icon-512.png"
  to = "/icon-512.png"
  status = 200
  force = true

[[redirects]]
  from = "/site.webmanifest"
  to = "/site.webmanifest"
  status = 200
  force = true

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"

[[redirects]]
  from = "/api/search/stream"
  to = "https://api.seekbox.ai/api/search/stream"
  status = 200
  force = true

[[redirects]]
  from = "/legacy/search/stream"
  to = "https://ruffled-snail.vibecode.run/api/search/stream"
  status = 200
  force = true

[[redirects]]
  from = "/v1/chat"
  to = "https://api.seekbox.ai/v1/chat"
  status = 200
  force = true

[[redirects]]
  from = "/v1/search"
  to = "https://api.seekbox.ai/v1/search"
  status = 200
  force = true

[[redirects]]
  from = "/v1/payments/*"
  to = "https://api.seekbox.ai/v1/payments/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/stripe/*"
  to = "https://api.seekbox.ai/api/stripe/:splat"
  status = 200
  force = true

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
